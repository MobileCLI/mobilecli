name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Security release gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Check CLI formatting
        working-directory: cli
        run: cargo fmt --check

      - name: Lint CLI
        working-directory: cli
        run: cargo clippy --all-targets -- -D warnings -A dead-code

      - name: Test CLI
        working-directory: cli
        run: cargo test

      - name: Verify installer script
        run: bash -n install.sh

      - name: Verify uninstaller script
        run: bash -n uninstall.sh

      - name: Test installer checksum verification
        run: bash scripts/test-installer-checksum.sh

      - name: Verify tag matches crate version
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          version = tomllib.loads(pathlib.Path("cli/Cargo.toml").read_text())["package"]["version"]
          expected = f"v{version}"
          actual = os.environ["GITHUB_REF_NAME"]
          if actual != expected:
              print(f"::error::Release tag {actual} must match cli/Cargo.toml version {expected}")
              sys.exit(1)
          PY

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz

          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.cross
        run: command -v cross || cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5

      - name: Test CLI on native runner
        if: ${{ !matrix.cross }}
        working-directory: cli
        run: cargo test --release

      - name: Build (native)
        if: ${{ !matrix.cross }}
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        working-directory: cli
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp cli/target/${{ matrix.target }}/release/mobilecli dist/
          chmod +x dist/mobilecli

          # Create archive
          cd dist
          tar -czvf ../mobilecli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz mobilecli

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy cli\target\${{ matrix.target }}\release\mobilecli.exe dist\

          # Create archive
          cd dist
          Compress-Archive -Path mobilecli.exe -DestinationPath ..\mobilecli-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobilecli-${{ matrix.target }}
          path: mobilecli-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -la release/
          expected=(
            "mobilecli-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz"
            "mobilecli-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz"
            "mobilecli-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz"
            "mobilecli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz"
            "mobilecli-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          )
          for file in "${expected[@]}"; do
            test -f "release/$file" || {
              echo "::error::Missing release archive: $file"
              exit 1
            }
          done
          count="$(find release -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.zip" \) | wc -l)"
          test "$count" -eq "${#expected[@]}" || {
            echo "::error::Expected ${#expected[@]} release archives, found $count"
            exit 1
          }

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum * > SHA256SUMS.txt
          expected=(
            "mobilecli-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz"
            "mobilecli-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz"
            "mobilecli-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz"
            "mobilecli-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz"
            "mobilecli-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip"
          )
          for file in "${expected[@]}"; do
            grep -Eq "  ${file}$" SHA256SUMS.txt || {
              echo "::error::Missing checksum entry: $file"
              exit 1
            }
          done
          line_count="$(wc -l < SHA256SUMS.txt | tr -d ' ')"
          test "$line_count" -eq "${#expected[@]}" || {
            echo "::error::Expected ${#expected[@]} checksum entries, found $line_count"
            exit 1
          }
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    # Only publish stable releases (no pre-release tags like v1.0.0-beta)
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        working-directory: cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not set."
            echo "Go to: https://crates.io/settings/tokens → New Token (scope: publish-new,publish-update)"
            echo "Then add it at: https://github.com/MobileCLI/mobilecli/settings/secrets/actions"
            exit 1
          fi
          cargo publish --token "$CARGO_REGISTRY_TOKEN"
